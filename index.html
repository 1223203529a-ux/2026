<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aurora Studio</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:Inter,Segoe UI,sans-serif;
  background:#0b1020;
  color:white;
  overflow-x:hidden;
}
.bg{
  position:fixed;inset:0;
  background:
  radial-gradient(circle at 20% 20%,#7c3aed55,transparent 30%),
  radial-gradient(circle at 80% 30%,#06b6d455,transparent 30%),
  radial-gradient(circle at 50% 80%,#ec489955,transparent 35%),
  #0b1020;
  z-index:-1;
}
nav{
  display:flex;justify-content:space-between;
  padding:24px 10%;
}
.logo{font-size:1.4rem;font-weight:700}
.hero{
  min-height:90vh;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:20px;
}
.hero h1{
  font-size:clamp(3rem,8vw,6rem);
  background:linear-gradient(90deg,#fff,#8be9fd,#c084fc);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}
.hero p{
  max-width:700px;
  margin:20px auto;
  color:#cbd5e1;
  line-height:1.7;
}
.btn{
  display:inline-block;
  padding:14px 28px;
  border-radius:999px;
  text-decoration:none;
  color:white;
  background:linear-gradient(90deg,#8b5cf6,#06b6d4);
  box-shadow:0 10px 30px rgba(99,102,241,.4);
}
.cards{
  width:min(1100px,90%);
  margin:auto;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:24px;
  padding-bottom:80px;
}
.card{
  background:rgba(255,255,255,.06);
  backdrop-filter:blur(12px);
  border:1px solid rgba(255,255,255,.08);
  padding:28px;
  border-radius:24px;
  transition:.3s;
}
.card:hover{
  transform:translateY(-8px);
}
footer{
  text-align:center;
  padding:40px;
  color:#94a3b8;
}
</style>
</head>
<body>
<div class="bg"></div>

<nav>
  <div class="logo">✨ Aurora Studio</div>
  <div>Design • Creative • Future</div>
</nav>

<section class="hero">
  <div>
    <h1>设计未来的数字体验</h1>
    <p>
      一个带有渐变光效、玻璃拟态卡片和现代设计风格的精美单页网站。
      适合作为个人主页、作品集或创业项目展示页。
    </p>
    <a class="btn" href="#" onclick="alert('欢迎来到 Aurora Studio!')">开始探索</a>
  </div>
</section>

<section class="cards">
  <div class="card">
    <h2>🎨 极简设计</h2>
    <p>现代化布局与高级视觉层次。</p>
  </div>
  <div class="card">
    <h2>⚡ 高性能</h2>
    <p>纯 HTML + CSS + JS，无依赖即可运行。</p>
  </div>
  <div class="card">
    <h2>🚀 创意展示</h2>
    <p>适合作品集、个人品牌与产品落地页。</p>
  </div>
</section>

<footer>
  Aurora Studio © 2026
</footer>
</body>
</html>
