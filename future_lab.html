
<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Future Lab</title>
<style>
body{margin:0;font-family:Arial,sans-serif;background:#0f172a;color:white}
.hero{min-height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;padding:20px}
h1{font-size:64px;margin:0}
p{max-width:700px}
button{padding:12px 24px;border:none;border-radius:999px;cursor:pointer}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:20px;padding:40px}
.card{background:rgba(255,255,255,.1);padding:20px;border-radius:16px}
</style>
</head>
<body>
<div class="hero">
<h1>🚀 Future Lab</h1>
<p>随机生成的科技风网页示例</p>
<button onclick="alert('实验启动成功！')">启动实验</button>
</div>
<div class="cards">
<div class="card"><h3>AI</h3><p>人工智能研究中心</p></div>
<div class="card"><h3>机器人</h3><p>自动化与控制系统</p></div>
<div class="card"><h3>航天</h3><p>探索未知宇宙</p></div>
</div>
</body>
</html>
